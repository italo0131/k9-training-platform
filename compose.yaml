services:
  k9trainingplatform:
    image: k9trainingplatform
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://devStartp:1533@db:5432/devStartp?schema=public"
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
    ports:
      - 3000:3000
    volumes:
      - ./prisma:/app/prisma
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: k9-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devStartp
      POSTGRES_PASSWORD: 1533
      POSTGRES_DB: devStartp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: